<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos - Admin | Midu Group</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-secondary);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--text);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .sidebar-header {
      padding: var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-lg);
      font-weight: 700;
    }
    
    .sidebar-logo img { width: 32px; height: 32px; }
    
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .user-info span {
      display: block;
    }
    
    .user-name {
      font-weight: 500;
      font-size: var(--font-size-sm);
    }
    
    .user-role {
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.6);
    }
    
    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-lg) 0;
    }
    
    .nav-section {
      margin-bottom: var(--spacing-lg);
    }
    
    .nav-section-title {
      padding: var(--spacing-sm) var(--spacing-xl);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      color: rgba(255,255,255,0.8);
      font-size: var(--font-size-sm);
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }
    
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .nav-item svg {
      width: 20px;
      height: 20px;
    }
    
    .nav-item .badge {
      margin-left: auto;
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: var(--font-size-xs);
    }
    
    .sidebar-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-sair {
      width: 100%;
      background: transparent;
      color: rgba(255,255,255,0.6);
      padding: var(--spacing-md);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    
    .btn-sair:hover { color: white; background: rgba(255,255,255,0.1); }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: var(--spacing-xl);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xl);
    }
    
    .page-header h1 {
      font-size: var(--font-size-2xl);
      font-weight: 600;
    }

    /* Filters */
    .filters-bar {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      display: flex;
      gap: var(--spacing-md);
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: var(--spacing-md);
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md) var(--spacing-sm) var(--spacing-xl);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .filter-select {
      padding: var(--spacing-sm) var(--spacing-lg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
      min-width: 150px;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-filter-clear {
      padding: var(--spacing-sm) var(--spacing-md);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      cursor: pointer;
    }

    .btn-filter-clear:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* Table Card */
    .table-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
    }

    .table-info {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .table-responsive {
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .table td {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .table tbody tr:hover {
      background: var(--bg-secondary);
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Status Badges */
    .status-badge {
      display: inline-flex;
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--font-size-xs);
      font-weight: 500;
      border-radius: var(--radius-full);
      border: 1px solid transparent;
    }

    .status-pendente {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.2);
    }

    .status-analise {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border-color: rgba(59, 130, 246, 0.2);
    }

    .status-entrevista {
      background: rgba(168, 85, 247, 0.1);
      color: #a855f7;
      border-color: rgba(168, 85, 247, 0.2);
    }

    .status-teste {
      background: rgba(249, 115, 22, 0.1);
      color: #f97316;
      border-color: rgba(249, 115, 22, 0.2);
    }

    .status-final {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.2);
    }

    .status-aprovado {
      background: rgba(16, 185, 129, 0.15);
      color: #059669;
      border-color: rgba(16, 185, 129, 0.3);
    }

    .status-reprovado {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.2);
    }

    /* Vaga name cell */
    .vaga-link {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }

    .vaga-link:hover {
      text-decoration: underline;
    }

    /* Actions */
    .action-btns {
      display: flex;
      gap: var(--spacing-xs);
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      color: var(--text);
    }

    .action-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-xl);
      border-top: 1px solid var(--border);
    }

    .pagination-btn {
      min-width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      font-size: var(--font-size-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .pagination-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      margin: 0 var(--spacing-md);
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-header span, .sidebar-user, .nav-section-title, .nav-item span, .sidebar-footer span { display: none; }
      .sidebar-nav { padding-top: var(--spacing-xl); }
      .nav-item { justify-content: center; padding: var(--spacing-md); }
      .main-content { margin-left: 80px; }
    }

    @media (max-width: 768px) {
      .filters-bar {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-box {
        min-width: 100%;
      }
      
      .table-responsive {
        overflow-x: scroll;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../assets/logo-white.png" alt="Midu Group" class="nav-logo-img">

    <nav class="sidebar-nav">

    </nav>
    
    <div class="sidebar-footer">
      <a href="login.html" class="btn-sair" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1>Candidatos</h1>
      <div class="page-header-actions">
        <button class="btn-secondary" onclick="exportCSV()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Buscar por nome, email ou vaga..." id="searchInput" oninput="filterCandidatos()">
      </div>
      
      <select class="filter-select" id="filterStatus" onchange="filterCandidatos()">
        <option value="todos">Todos Status</option>
        <option value="Pendente">Pendente</option>
        <option value="Em Análise">Em Análise</option>
        <option value="Entrevista">Entrevista</option>
        <option value="Teste">Teste</option>
        <option value="Final">Final</option>
        <option value="Aprovado">Aprovado</option>
        <option value="Reprovado">Reprovado</option>
      </select>

      <select class="filter-select" id="filterVaga" onchange="filterCandidatos()">
        <option value="todas">Todas Vagas</option>
        <option value="Analista de RH">Analista de RH</option>
        <option value="Desenvolvedor Frontend">Desenvolvedor Frontend</option>
        <option value="Gerente de Vendas">Gerente de Vendas</option>
      </select>

      <button class="btn-filter-clear" onclick="clearFilters()">Limpar</button>
    </div>

    <!-- Candidates Table -->
    <div class="table-card">
      <div class="table-header-info">
        <h3 class="table-title">Lista de Candidatos</h3>
        <span class="table-info">Mostrando <span id="showingCount">47</span> de <span id="totalCount">47</span> candidatos</span>
      </div>

      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Vaga</th>
              <th>Status</th>
              <th>Data Candidatura</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="candidatosTableBody">
            <!-- Data will be inserted by JavaScript -->
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">‹</button>
        <div id="pageNumbers"></div>
        <button class="pagination-btn" id="nextBtn" onclick="changePage(1)">›</button>
        <span class="pagination-info">Página <span id="currentPage">1</span> de <span id="totalPages">1</span></span>
      </div>
    </div>
  </main>

  <script>
    // Mock candidates data
    let candidatos = [
      { id: 1, nome: 'Maria Santos', email: 'maria.santos@email.com', telefone: '(71) 99999-0001', vaga: 'Analista de RH', status: 'Entrevista', data: '08/05/2026' },
      { id: 2, nome: 'João Silva', email: 'joao.silva@email.com', telefone: '(71) 99999-0002', vaga: 'Desenvolvedor Frontend', status: 'Em Análise', data: '07/05/2026' },
      { id: 3, nome: 'Ana Costa', email: 'ana.costa@email.com', telefone: '(71) 99999-0003', vaga: 'Gerente de Vendas', status: 'Aprovado', data: '06/05/2026' },
      { id: 4, nome: 'Pedro Oliveira', email: 'pedro.oliveira@email.com', telefone: '(71) 99999-0004', vaga: 'Analista de Sistemas', status: 'Pendente', data: '05/05/2026' },
      { id: 5, nome: 'Julia Lima', email: 'julia.lima@email.com', telefone: '(71) 99999-0005', vaga: 'Professor de Matemática', status: 'Teste', data: '04/05/2026' },
      { id: 6, nome: 'Carlos Santos', email: 'carlos.santos@email.com', telefone: '(71) 99999-0006', vaga: 'Desenvolvedor Backend', status: 'Em Análise', data: '03/05/2026' },
      { id: 7, nome: 'Fernanda Almeida', email: 'fernanda.almeida@email.com', telefone: '(71) 99999-0007', vaga: 'Enfermeiro(a)', status: 'Final', data: '02/05/2026' },
      { id: 8, nome: 'Ricardo Souza', email: 'ricardo.souza@email.com', telefone: '(71) 99999-0008', vaga: 'Assistente Administrativo', status: 'Pendente', data: '01/05/2026' },
      { id: 9, nome: 'Beatriz Mendes', email: 'beatriz.mendes@email.com', telefone: '(71) 99999-0009', vaga: 'Vendedor(a)', status: 'Entrevista', data: '30/04/2026' },
      { id: 10, nome: 'Lucas Pereira', email: 'lucas.pereira@email.com', telefone: '(71) 99999-0010', vaga: 'Psicólogo(a) Organizacional', status: 'Reprovado', data: '29/04/2026' },
      { id: 11, nome: 'Amanda Rocha', email: 'amanda.rocha@email.com', telefone: '(71) 99999-0011', vaga: 'Analista de Marketing', status: 'Aprovado', data: '28/04/2026' },
      { id: 12, nome: 'Bruno Ferreira', email: 'bruno.ferreira@email.com', telefone: '(71) 99999-0012', vaga: 'Fisioterapeuta', status: 'Teste', data: '27/04/2026' },
      { id: 13, nome: 'Camila Nunes', email: 'camila.nunes@email.com', telefone: '(71) 99999-0013', vaga: 'Coordenador Pedagógico', status: 'Entrevista', data: '26/04/2026' },
      { id: 14, nome: 'Eduardo Barbosa', email: 'eduardo.barbosa@email.com', telefone: '(71) 99999-0014', vaga: 'Analista de RH', status: 'Em Análise', data: '25/04/2026' },
      { id: 15, nome: 'Patricia Lima', email: 'patricia.lima@email.com', telefone: '(71) 99999-0015', vaga: 'Desenvolvedor Frontend', status: 'Final', data: '24/04/2026' }
    ];

    let currentPage = 1;
    const rowsPerPage = 15;
    let filteredCandidatos = [...candidatos];

    function navigateTo(page) {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (page !== 'login.html' && !isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      window.location.href = page;
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    }

    function updateActiveNav(currentPage) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(currentPage)) {
          item.classList.add('active');
        }
      });
    }

    function getStatusClass(status) {
      const map = {
        'Pendente': 'status-pendente',
        'Em Análise': 'status-analise',
        'Entrevista': 'status-entrevista',
        'Teste': 'status-teste',
        'Final': 'status-final',
        'Aprovado': 'status-aprovado',
        'Reprovado': 'status-reprovado'
      };
      return map[status] || 'status-pendente';
    }

    function renderTable() {
      const tbody = document.getElementById('candidatosTableBody');
      tbody.innerHTML = '';
      
      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = filteredCandidatos.slice(start, end);
      
      pageData.forEach(candidato => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${candidato.nome}</strong></td>
          <td>${candidato.email}</td>
          <td>${candidato.telefone}</td>
          <td><a href="vagas.html" class="vaga-link" onclick="navigateTo('vagas.html')">${candidato.vaga}</a></td>
          <td><span class="status-badge ${getStatusClass(candidato.status)}">${candidato.status}</span></td>
          <td>${candidato.data}</td>
          <td>
            <div class="action-btns">
              <a href="candidato-detalhes.html?id=${candidato.id}" class="action-btn" title="Ver Detalhes" onclick="navigateTo('candidato-detalhes.html?id=${candidato.id}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </a>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
      
      updatePagination();
    }

    function filterCandidatos() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      const vaga = document.getElementById('filterVaga').value;
      
      filteredCandidatos = candidatos.filter(c => {
        const matchSearch = c.nome.toLowerCase().includes(search) || 
                           c.email.toLowerCase().includes(search) ||
                           c.vaga.toLowerCase().includes(search);
        const matchStatus = status === 'todos' || c.status === status;
        const matchVaga = vaga === 'todas' || c.vaga === vaga;
        return matchSearch && matchStatus && matchVaga;
      });
      
      currentPage = 1;
      renderTable();
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterStatus').value = 'todos';
      document.getElementById('filterVaga').value = 'todas';
      filteredCandidatos = [...candidatos];
      currentPage = 1;
      renderTable();
    }

    function updatePagination() {
      const totalPages = Math.ceil(filteredCandidatos.length / rowsPerPage);
      const start = (currentPage - 1) * rowsPerPage + 1;
      const end = Math.min(currentPage * rowsPerPage, filteredCandidatos.length);
      
      document.getElementById('showingCount').textContent = filteredCandidatos.length > 0 ? start + '-' + end : 0;
      document.getElementById('totalCount').textContent = filteredCandidatos.length;
      
      // Page numbers
      const pageNumbersDiv = document.getElementById('pageNumbers');
      pageNumbersDiv.innerHTML = '';
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
          const btn = document.createElement('button');
          btn.className = 'pagination-btn' + (i === currentPage ? ' active' : '');
          btn.textContent = i;
          btn.onclick = () => goToPage(i);
          pageNumbersDiv.appendChild(btn);
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          const span = document.createElement('span');
          span.textContent = '...';
          span.style.padding = '0 8px';
          span.style.color = 'var(--text-muted)';
          pageNumbersDiv.appendChild(span);
        }
      }
      
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function goToPage(page) {
      currentPage = page;
      renderTable();
    }

    function changePage(direction) {
      const totalPages = Math.ceil(filteredCandidatos.length / rowsPerPage);
      const newPage = currentPage + direction;
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        renderTable();
      }
    }

    function exportCSV() {
      const headers = ['Nome', 'Email', 'Telefone', 'Vaga', 'Status', 'Data Candidatura'];
      const rows = filteredCandidatos.map(c => 
        `${c.nome},${c.email},${c.telefone},${c.vaga},${c.status},${c.data}`
      );
      
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'candidatos.csv';
      link.click();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      
      const currentPagePath = window.location.pathname.split('/').pop();
      updateActiveNav(currentPagePath);
      
      renderTable();
    });
  </script>
</body>
</html>
