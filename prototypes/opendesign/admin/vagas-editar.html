<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Vaga - Admin | Midu Group</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-secondary);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--text);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .sidebar-header {
      padding: var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-lg);
      font-weight: 700;
    }
    
    .sidebar-logo img { height: 32px; width: auto; }
    
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .user-info span {
      display: block;
    }
    
    .user-name {
      font-weight: 500;
      font-size: var(--font-size-sm);
    }
    
    .user-role {
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.6);
    }
    
    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-lg) 0;
    }
    
    .nav-section {
      margin-bottom: var(--spacing-lg);
    }
    
    .nav-section-title {
      padding: var(--spacing-sm) var(--spacing-xl);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      color: rgba(255,255,255,0.8);
      font-size: var(--font-size-sm);
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }
    
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .nav-item svg {
      width: 20px;
      height: 20px;
    }
    
    .sidebar-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-sair {
      width: 100%;
      background: transparent;
      color: rgba(255,255,255,0.6);
      padding: var(--spacing-md);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    
    .btn-sair:hover { color: white; background: rgba(255,255,255,0.1); }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: var(--spacing-xl);
      max-width: 1200px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }
    
    .back-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      color: var(--text-muted);
      text-decoration: none;
      font-size: var(--font-size-sm);
      transition: var(--transition);
    }
    
    .back-link:hover {
      color: var(--primary);
    }

    .page-header h1 {
      font-size: var(--font-size-2xl);
      font-weight: 600;
    }

    /* Form Card */
    .form-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
    }

    .form-section-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text);
    }

    .form-label.required::after {
      content: ' *';
      color: var(--error);
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font-body);
      transition: var(--transition);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-hint {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-lg);
    }

    /* Buttons */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-md);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: var(--spacing-sm) var(--spacing-xl);
      border-radius: var(--radius);
      font-weight: 500;
      font-size: var(--font-size-sm);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      border: none;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--text);
      color: white;
      padding: var(--spacing-md) var(--spacing-xl);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: none;
      animation: slideIn 0.3s ease;
      z-index: 9999;
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--error);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Danger zone */
    .danger-zone {
      border-color: var(--error);
    }

    .danger-zone .form-section-title {
      color: var(--error);
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-header span, .sidebar-user, .nav-section-title, .nav-item span, .sidebar-footer span { display: none; }
      .sidebar-nav { padding-top: var(--spacing-xl); }
      .nav-item { justify-content: center; padding: var(--spacing-md); }
      .main-content { margin-left: 80px; }
      .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .form-row-2, .form-row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../assets/logo-white.png" alt="Midu Group" class="nav-logo-img">
        <span>Midu Group</span>
      </div>
    </div>
    
    <div class="sidebar-user">
      <div class="user-avatar">DD</div>
      <div class="user-info">
        <span class="user-name">Daniel Duarte</span>
        <span class="user-role">Administrador</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Menu</div>
        <a href="index.html" class="nav-item" onclick="navigateTo('index.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="vagas.html" class="nav-item" onclick="navigateTo('vagas.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          <span>Vagas</span>
        </a>
        <a href="candidatos.html" class="nav-item" onclick="navigateTo('candidatos.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Candidatos</span>
        </a>
        <a href="relatorios.html" class="nav-item" onclick="navigateTo('relatorios.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          <span>Relatórios</span>
        </a>
      </div>
    </nav>
    
    <div class="sidebar-footer">
      <a href="login.html" class="btn-sair" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <a href="vagas.html" class="back-link" onclick="navigateTo('vagas.html')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
        Voltar
      </a>
      <h1 id="formTitle">Editar Vaga</h1>
    </div>

    <form id="vagaForm" onsubmit="saveVaga(event)">
      <div class="form-card">
        <h3 class="form-section-title">Informações Básicas</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label required">Título da Vaga</label>
            <input type="text" class="form-input" name="title" id="title" required placeholder="Ex: Analista de RH">
          </div>
          <div class="form-group">
            <label class="form-label required">Empresa Contratante</label>
            <input type="text" class="form-input" name="empresa" id="empresa" required placeholder="Ex: Empresa XPTO">
          </div>
          <div class="form-group">
            <label class="form-label required">Categoria</label>
            <select class="form-select" name="categoria" id="categoria" required>
              <option value="">Selecione...</option>
              <option value="Tecnologia">Tecnologia</option>
              <option value="RH">RH</option>
              <option value="Vendas">Vendas</option>
              <option value="Administração">Administração</option>
              <option value="Saúde">Saúde</option>
              <option value="Educação">Educação</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label required">Localização</label>
            <input type="text" class="form-input" name="localizacao" id="localizacao" required placeholder="Ex: Salvador, BA">
          </div>
          <div class="form-group">
            <label class="form-label">Salário</label>
            <input type="text" class="form-input" name="salario" id="salario" placeholder="Ex: R$ 3.500,00 ou A combinar">
          </div>
          <div class="form-group">
            <label class="form-label required">Status</label>
            <select class="form-select" name="status" id="status" required>
              <option value="Ativa">Ativa</option>
              <option value="Inativa">Inativa</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h3 class="form-section-title">Descrição da Vaga</h3>
        <div class="form-grid">
          <div class="form-group full-width">
            <label class="form-label required">Descrição</label>
            <textarea class="form-textarea" name="descricao" id="descricao" required placeholder="Descreva as responsabilidades e expectativas da vaga..."></textarea>
          </div>
          <div class="form-group full-width">
            <label class="form-label required">Requisitos</label>
            <textarea class="form-textarea" name="requisitos" id="requisitos" required placeholder="Liste os requisitos da vaga, um por linha..."></textarea>
          </div>
          <div class="form-group full-width">
            <label class="form-label">Benefícios</label>
            <textarea class="form-textarea" name="beneficios" id="beneficios" placeholder="Liste os benefícios oferecidos, um por linha..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h3 class="form-section-title">Informações Adicionais</h3>
        <div class="form-row-3">
          <div class="form-group">
            <label class="form-label">Tipo de Contrato</label>
            <select class="form-select" name="contrato" id="contrato">
              <option value="">Selecione...</option>
              <option value="CLT">CLT</option>
              <option value="PJ">PJ</option>
              <option value="Estágio">Estágio</option>
              <option value="Freelancer">Freelancer</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Carga Horária</label>
            <input type="text" class="form-input" name="cargaHoraria" id="cargaHoraria" placeholder="Ex: 40h semanais">
          </div>
          <div class="form-group">
            <label class="form-label">Nível</label>
            <select class="form-select" name="nivel" id="nivel">
              <option value="">Selecione...</option>
              <option value="Júnior">Júnior</option>
              <option value="Pleno">Pleno</option>
              <option value="Sênior">Sênior</option>
              <option value="Especialista">Especialista</option>
              <option value="Líder">Líder</option>
              <option value="Gerente">Gerente</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-card danger-zone">
        <h3 class="form-section-title">Zona de Perigo</h3>
        <div class="form-group">
          <p class="form-hint" style="color: var(--text-muted); margin-bottom: var(--spacing-md);">
            Ações irreversíveis. Tenha certeza antes de prosseguir.
          </p>
          <button type="button" class="btn btn-danger" onclick="deleteVaga()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Excluir Vaga Permanentemente
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="navigateTo('vagas.html')">Cancelar</button>
        <button type="submit" class="btn btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Salvar Alterações
        </button>
      </div>
    </form>

    <div class="toast" id="toast"></div>
  </main>

  <script>
    // Mock data storage (simulating database)
    let vagas = JSON.parse(localStorage.getItem('vagas')) || [
      { id: 1, title: 'Analista de RH', empresa: 'Empresa XPTO', categoria: 'RH', localizacao: 'Salvador, BA', salario: 'R$ 3.500', status: 'Ativa', descricao: 'Buscamos Analista de RH para atuar com rotinas de pessoal, recrutamento e seleção.', requisitos: 'Superior completo em RH ou Psicologia\nExperiência em recrutamento e seleção\nConhecimento em sistema de folha', beneficios: 'Vale-transporte\nVale-refeição\nPlano de saúde', contrato: 'CLT', cargaHoraria: '40h semanais', nivel: 'Pleno', candidatos: 12, data: '08/05/2026' },
      { id: 2, title: 'Desenvolvedor Frontend', empresa: 'Tech Solutions', categoria: 'Tecnologia', localizacao: 'Remoto', salario: 'R$ 5.000', status: 'Ativa', descricao: 'Desenvolvedor Frontend com experiência em React/Next.js', requisitos: '3+ anos com React\nTypeScript avançado\nExperiência com APIs REST', beneficios: 'Home office\nVale-refeição\nPlano de saúde', contrato: 'PJ', cargaHoraria: '40h', nivel: 'Pleno', candidatos: 28, data: '07/05/2026' },
      { id: 3, title: 'Gerente de Vendas', empresa: 'Comercial Silva', categoria: 'Vendas', localizacao: 'Feira de Santana', salario: 'R$ 4.200', status: 'Ativa', descricao: 'Gerente de vendas para liderar equipe comercial', requisitos: 'Experiência em gestão de equipes\nConhecimento do mercado regional\nHabilidade em negociação', beneficios: 'Comissão\nVale-transporte', contrato: 'CLT', cargaHoraria: '44h', nivel: 'Sênior', candidatos: 8, data: '06/05/2026' }
    ];

    function navigateTo(page) {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (page !== 'login.html' && !isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      window.location.href = page;
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    function getVagaIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id'));
    }

    function loadVaga() {
      const id = getVagaIdFromUrl();
      const vaga = vagas.find(v => v.id === id);
      
      if (!vaga) {
        showToast('Vaga não encontrada', 'error');
        setTimeout(() => navigateTo('vagas.html'), 1500);
        return;
      }

      // Fill form
      document.getElementById('title').value = vaga.title;
      document.getElementById('empresa').value = vaga.empresa;
      document.getElementById('categoria').value = vaga.categoria;
      document.getElementById('localizacao').value = vaga.localizacao;
      document.getElementById('salario').value = vaga.salario || '';
      document.getElementById('status').value = vaga.status;
      document.getElementById('descricao').value = vaga.descricao || '';
      document.getElementById('requisitos').value = vaga.requisitos || '';
      document.getElementById('beneficios').value = vaga.beneficios || '';
      document.getElementById('contrato').value = vaga.contrato || '';
      document.getElementById('cargaHoraria').value = vaga.cargaHoraria || '';
      document.getElementById('nivel').value = vaga.nivel || '';
    }

    function saveVaga(e) {
      e.preventDefault();
      
      const id = getVagaIdFromUrl();
      const formData = new FormData(e.target);
      
      const vagaIndex = vagas.findIndex(v => v.id === id);
      
      if (vagaIndex === -1) {
        showToast('Vaga não encontrada', 'error');
        return;
      }

      // Update vaga
      vagas[vagaIndex] = {
        ...vagas[vagaIndex],
        title: formData.get('title'),
        empresa: formData.get('empresa'),
        categoria: formData.get('categoria'),
        localizacao: formData.get('localizacao'),
        salario: formData.get('salario') || 'A combinar',
        status: formData.get('status'),
        descricao: formData.get('descricao'),
        requisitos: formData.get('requisitos'),
        beneficios: formData.get('beneficios'),
        contrato: formData.get('contrato') || '',
        cargaHoraria: formData.get('cargaHoraria') || '',
        nivel: formData.get('nivel') || ''
      };

      // Save to localStorage
      localStorage.setItem('vagas', JSON.stringify(vagas));

      showToast('Vaga atualizada com sucesso!', 'success');
      
      setTimeout(() => {
        navigateTo('vagas.html');
      }, 1000);
    }

    function deleteVaga() {
      if (confirm('Tem certeza que deseja excluir esta vaga permanentemente? Esta ação não pode ser desfeita.')) {
        const id = getVagaIdFromUrl();
        vagas = vagas.filter(v => v.id !== id);
        localStorage.setItem('vagas', JSON.stringify(vagas));
        showToast('Vaga excluída com sucesso!', 'success');
        setTimeout(() => navigateTo('vagas.html'), 1000);
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      
      // Load vaga data
      loadVaga();
    });
  </script>
</body>
</html>
