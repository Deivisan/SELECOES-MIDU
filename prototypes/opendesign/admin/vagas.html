<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Vagas - Admin | Midu Group</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-secondary);
    }

    /* Sidebar - copiar do index.html */
    .sidebar {
      width: 260px;
      background: var(--text);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .sidebar-header {
      padding: var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-lg);
      font-weight: 700;
    }
    
    .sidebar-logo img { width: 32px; height: 32px; }
    
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .user-info span {
      display: block;
    }
    
    .user-name {
      font-weight: 500;
      font-size: var(--font-size-sm);
    }
    
    .user-role {
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.6);
    }
    
    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-lg) 0;
    }
    
    .nav-section {
      margin-bottom: var(--spacing-lg);
    }
    
    .nav-section-title {
      padding: var(--spacing-sm) var(--spacing-xl);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      color: rgba(255,255,255,0.8);
      font-size: var(--font-size-sm);
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }
    
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .nav-item svg {
      width: 20px;
      height: 20px;
    }
    
    .nav-item .badge {
      margin-left: auto;
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: var(--font-size-xs);
    }
    
    .sidebar-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-new-vaga {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: var(--spacing-md);
      border-radius: var(--radius);
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: var(--font-size-sm);
    }
    
    .btn-new-vaga:hover { background: var(--primary-dark); }
    
    .btn-sair {
      width: 100%;
      background: transparent;
      color: rgba(255,255,255,0.6);
      padding: var(--spacing-md);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    
    .btn-sair:hover { color: white; background: rgba(255,255,255,0.1); }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: var(--spacing-xl);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xl);
    }
    
    .page-header h1 {
      font-size: var(--font-size-2xl);
      font-weight: 600;
    }
    
    .page-header-actions {
      display: flex;
      gap: var(--spacing-md);
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius);
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      border: none;
      cursor: pointer;
      font-size: var(--font-size-sm);
    }
    
    .btn-primary:hover { background: var(--primary-dark); }
    
    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius);
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: var(--font-size-sm);
    }
    
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

    /* Filters Bar */
    .filters-bar {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      display: flex;
      gap: var(--spacing-md);
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: var(--spacing-md);
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md) var(--spacing-sm) var(--spacing-xl);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .filter-select {
      padding: var(--spacing-sm) var(--spacing-lg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
      min-width: 150px;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-filter-clear {
      padding: var(--spacing-sm) var(--spacing-md);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      cursor: pointer;
    }

    .btn-filter-clear:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* Table Card */
    .table-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
    }

    .table-info {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .table-responsive {
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .table td {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .table tbody tr:hover {
      background: var(--bg-secondary);
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    .status-badge {
      display: inline-flex;
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--font-size-xs);
      font-weight: 500;
      border-radius: var(--radius-full);
    }

    .status-active {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-inactive {
      background: rgba(100, 116, 139, 0.1);
      color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.2);
    }

    .category-badge {
      display: inline-flex;
      padding: 2px 10px;
      font-size: var(--font-size-xs);
      font-weight: 500;
      border-radius: var(--radius-sm);
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary);
    }

    .action-btns {
      display: flex;
      gap: var(--spacing-xs);
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      color: var(--text);
    }

    .action-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .action-btn.delete:hover {
      background: var(--error);
      border-color: var(--error);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-xl);
      border-top: 1px solid var(--border);
    }

    .pagination-btn {
      min-width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      font-size: var(--font-size-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .pagination-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      margin: 0 var(--spacing-md);
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-header span, .sidebar-user, .nav-section-title, .nav-item span, .sidebar-footer span { display: none; }
      .sidebar-nav { padding-top: var(--spacing-xl); }
      .nav-item { justify-content: center; padding: var(--spacing-md); }
      .main-content { margin-left: 80px; }
    }

    @media (max-width: 768px) {
      .filters-bar {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-box {
        min-width: 100%;
      }
      
      .table-responsive {
        overflow-x: scroll;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../assets/logo-white.png" alt="Midu Group" class="nav-logo-img">
        <span>Midu Group</span>
      </div>
    </div>
    
    <div class="sidebar-user">
      <div class="user-avatar">DD</div>
      <div class="user-info">
        <span class="user-name">Daniel Duarte</span>
        <span class="user-role">Administrador</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Menu</div>
        <a href="index.html" class="nav-item" onclick="navigateTo('index.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="vagas.html" class="nav-item active" onclick="navigateTo('vagas.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          <span>Vagas</span>
          <span class="badge" id="vagaCount">12</span>
        </a>
        <a href="candidatos.html" class="nav-item" onclick="navigateTo('candidatos.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Candidatos</span>
          <span class="badge">47</span>
        </a>
        <a href="relatorios.html" class="nav-item" onclick="navigateTo('relatorios.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          <span>Relatórios</span>
        </a>
      </div>
    </nav>
    
    <div class="sidebar-footer">
      <a href="vagas-nova.html" class="btn-new-vaga">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Vaga
      </a>
      <a href="login.html" class="btn-sair" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1>Gestão de Vagas</h1>
      <div class="page-header-actions">
        <a href="vagas-nova.html" class="btn-primary" onclick="navigateTo('vagas-nova.html')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Vaga
        </a>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Buscar por título, empresa ou palavra-chave..." id="searchInput" oninput="filterVagas()">
      </div>
      
      <select class="filter-select" id="filterCategoria" onchange="filterVagas()">
        <option value="todas">Todas Categorias</option>
        <option value="Tecnologia">Tecnologia</option>
        <option value="RH">RH</option>
        <option value="Vendas">Vendas</option>
        <option value="Administração">Administração</option>
        <option value="Saúde">Saúde</option>
        <option value="Educação">Educação</option>
      </select>

      <select class="filter-select" id="filterStatus" onchange="filterVagas()">
        <option value="todas">Todos Status</option>
        <option value="Ativa">Ativa</option>
        <option value="Inativa">Inativa</option>
      </select>

      <button class="btn-filter-clear" onclick="clearFilters()">Limpar Filtros</button>
    </div>

    <!-- Jobs Table -->
    <div class="table-card">
      <div class="table-header-info">
        <h3 class="table-title">Lista de Vagas</h3>
        <span class="table-info">Mostrando <span id="showingCount">12</span> de <span id="totalCount">12</span> vagas</span>
      </div>

      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Título</th>
              <th>Empresa</th>
              <th>Categoria</th>
              <th>Localização</th>
              <th>Salário</th>
              <th>Status</th>
              <th>Candidatos</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="vagasTableBody">
            <!-- Data will be inserted by JavaScript -->
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">‹</button>
        <div id="pageNumbers"></div>
        <button class="pagination-btn" id="nextBtn" onclick="changePage(1)">›</button>
        <span class="pagination-info">Página <span id="currentPage">1</span> de <span id="totalPages">1</span></span>
      </div>
    </div>
  </main>

  <script>
    // Mock data for vagas
    let vagas = [
      { id: 1, title: 'Analista de RH', empresa: 'Empresa XPTO', categoria: 'RH', localizacao: 'Salvador, BA', salario: 'R$ 3.500', status: 'Ativa', candidatos: 12, data: '08/05/2026' },
      { id: 2, title: 'Desenvolvedor Frontend', empresa: 'Tech Solutions', categoria: 'Tecnologia', localizacao: 'Remoto', salario: 'R$ 5.000', status: 'Ativa', candidatos: 28, data: '07/05/2026' },
      { id: 3, title: 'Gerente de Vendas', empresa: 'Comercial Silva', categoria: 'Vendas', localizacao: 'Feira de Santana', salario: 'R$ 4.200', status: 'Ativa', candidatos: 8, data: '06/05/2026' },
      { id: 4, title: 'Professor de Matemática', empresa: 'Colégio ABC', categoria: 'Educação', localizacao: 'Salvador, BA', salario: 'R$ 3.200', status: 'Inativa', candidatos: 5, data: '05/05/2026' },
      { id: 5, title: 'Enfermeiro(a)', empresa: 'Hospital Santa Maria', categoria: 'Saúde', localizacao: 'Salvador, BA', salario: 'R$ 4.800', status: 'Ativa', candidatos: 15, data: '04/05/2026' },
      { id: 6, title: 'Assistente Administrativo', empresa: 'Escritório Central', categoria: 'Administração', localizacao: 'Salvador, BA', salario: 'R$ 2.200', status: 'Ativa', candidatos: 32, data: '03/05/2026' },
      { id: 7, title: 'Desenvolvedor Backend', empresa: 'Tech Solutions', categoria: 'Tecnologia', localizacao: 'Remoto', salario: 'R$ 6.000', status: 'Ativa', candidatos: 18, data: '02/05/2026' },
      { id: 8, title: 'Vendedor(a)', empresa: 'Loja Fashion', categoria: 'Vendas', localizacao: 'Salvador, BA', salario: 'R$ 2.800 + comissão', status: 'Ativa', candidatos: 21, data: '01/05/2026' },
      { id: 9, title: 'Psicólogo(a) Organizacional', empresa: 'Consultoria RH Bahia', categoria: 'RH', localizacao: 'Salvador, BA', salario: 'A combinar', status: 'Ativa', candidatos: 7, data: '30/04/2026' },
      { id: 10, title: 'Coordenador Pedagógico', empresa: 'Escola Novo Saber', categoria: 'Educação', localizacao: 'Feira de Santana', salario: 'R$ 5.500', status: 'Inativa', candidatos: 3, data: '29/04/2026' },
      { id: 11, title: 'Analista de Marketing', empresa: 'Agência Digital BA', categoria: 'Vendas', localizacao: 'Remoto', salario: 'R$ 3.800', status: 'Ativa', candidatos: 14, data: '28/04/2026' },
      { id: 12, title: 'Fisioterapeuta', empresa: 'Clínica Reviver', categoria: 'Saúde', localizacao: 'Salvador, BA', salario: 'R$ 4.200', status: 'Ativa', candidatos: 9, data: '27/04/2026' }
    ];

    let currentPage = 1;
    const rowsPerPage = 10;
    let filteredVagas = [...vagas];

    // Navigation helper
    function navigateTo(page) {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (page !== 'login.html' && !isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      window.location.href = page;
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    }

    function updateActiveNav(currentPage) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(currentPage)) {
          item.classList.add('active');
        }
      });
    }

    function renderTable() {
      const tbody = document.getElementById('vagasTableBody');
      tbody.innerHTML = '';
      
      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = filteredVagas.slice(start, end);
      
      pageData.forEach(vaga => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${vaga.title}</strong></td>
          <td>${vaga.empresa}</td>
          <td><span class="category-badge">${vaga.categoria}</span></td>
          <td>${vaga.localizacao}</td>
          <td>${vaga.salario}</td>
          <td><span class="status-badge ${vaga.status === 'Ativa' ? 'status-active' : 'status-inactive'}">${vaga.status}</span></td>
          <td>${vaga.candidatos}</td>
          <td>${vaga.data}</td>
          <td>
            <div class="action-btns">
              <a href="vagas-editar.html?id=${vaga.id}" class="action-btn" title="Editar" onclick="navigateTo('vagas-editar.html?id=${vaga.id}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </a>
              <button class="action-btn delete" title="Excluir" onclick="deleteVaga(${vaga.id})">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      });
      
      updatePagination();
    }

    function filterVagas() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const categoria = document.getElementById('filterCategoria').value;
      const status = document.getElementById('filterStatus').value;
      
      filteredVagas = vagas.filter(vaga => {
        const matchSearch = vaga.title.toLowerCase().includes(search) || 
                          vaga.empresa.toLowerCase().includes(search);
        const matchCategoria = categoria === 'todas' || vaga.categoria === categoria;
        const matchStatus = status === 'todas' || vaga.status === status;
        return matchSearch && matchCategoria && matchStatus;
      });
      
      currentPage = 1;
      renderTable();
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterCategoria').value = 'todas';
      document.getElementById('filterStatus').value = 'todas';
      filteredVagas = [...vagas];
      currentPage = 1;
      renderTable();
    }

    function updatePagination() {
      const totalPages = Math.ceil(filteredVagas.length / rowsPerPage);
      const start = (currentPage - 1) * rowsPerPage + 1;
      const end = Math.min(currentPage * rowsPerPage, filteredVagas.length);
      
      document.getElementById('showingCount').textContent = filteredVagas.length > 0 ? start + '-' + end : 0;
      document.getElementById('totalCount').textContent = filteredVagas.length;
      document.getElementById('currentPage').textContent = currentPage;
      document.getElementById('totalPages').textContent = totalPages;
      
      // Render page numbers
      const pageNumbersDiv = document.getElementById('pageNumbers');
      pageNumbersDiv.innerHTML = '';
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
          const btn = document.createElement('button');
          btn.className = 'pagination-btn' + (i === currentPage ? ' active' : '');
          btn.textContent = i;
          btn.onclick = () => goToPage(i);
          pageNumbersDiv.appendChild(btn);
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          const span = document.createElement('span');
          span.textContent = '...';
          span.style.padding = '0 8px';
          span.style.color = 'var(--text-muted)';
          pageNumbersDiv.appendChild(span);
        }
      }
      
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function goToPage(page) {
      currentPage = page;
      renderTable();
    }

    function changePage(direction) {
      const totalPages = Math.ceil(filteredVagas.length / rowsPerPage);
      const newPage = currentPage + direction;
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        renderTable();
      }
    }

    function deleteVaga(id) {
      if (confirm('Tem certeza que deseja excluir esta vaga?')) {
        vagas = vagas.filter(v => v.id !== id);
        filterVagas();
        alert('Vaga excluída com sucesso!');
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      
      const currentPagePath = window.location.pathname.split('/').pop();
      updateActiveNav(currentPagePath);
      
      document.getElementById('vagaCount').textContent = vagas.filter(v => v.status === 'Ativa').length;
      renderTable();
    });
  </script>
</body>
</html>
