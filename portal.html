<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Candidato - Midu Group</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-secondary);
      min-height: 100vh;
      opacity: 0;
      animation: portalFadeIn 0.4s ease forwards;
    }
    @keyframes portalFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .portal-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: var(--spacing-md) 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--spacing-xl);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .portal-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .portal-logo img {
      width: 32px;
      height: 32px;
    }

    .portal-nav {
      display: flex;
      gap: var(--spacing-xl);
    }

    .portal-nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: var(--font-size-sm);
      font-weight: 500;
      transition: var(--transition);
    }

    .portal-nav-link:hover,
    .portal-nav-link.active {
      color: var(--primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      cursor: pointer;
      position: relative;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: var(--font-size-sm);
      color: white;
    }

    .user-name {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text);
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-width: 180px;
      box-shadow: var(--shadow-lg);
      display: none;
      flex-direction: column;
      padding: var(--spacing-xs) 0;
      margin-top: var(--spacing-xs);
    }

    .dropdown-menu.show {
      display: flex;
    }

    .dropdown-item {
      padding: var(--spacing-sm) var(--spacing-md);
      color: var(--text);
      text-decoration: none;
      font-size: var(--font-size-sm);
      transition: var(--transition);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .dropdown-item:hover {
      background: var(--bg-secondary);
      color: var(--primary);
    }

    /* Main Content */
    .portal-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-2xl) var(--spacing-xl);
    }

    .section-title {
      font-size: var(--font-size-2xl);
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-xl);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-xl);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      padding: 0 var(--spacing-lg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .tab {
      padding: var(--spacing-md) var(--spacing-lg);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: -1px;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-count {
      display: inline-flex;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary);
      border-radius: 10px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      align-items: center;
      justify-content: center;
      margin-left: var(--spacing-xs);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Candidate Cards */
    .candidates-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .candidate-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      transition: var(--transition);
      cursor: pointer;
    }

    .candidate-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }

    .candidate-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-md);
    }

    .candidate-vaga {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
    }

    .candidate-company {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .candidate-status {
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      white-space: nowrap;
    }

    .candidate-meta {
      display: flex;
      gap: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .candidate-meta span {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .candidate-meta svg {
      width: 16px;
      height: 16px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: var(--spacing-3xl);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      color: var(--text-muted);
      margin-bottom: var(--spacing-lg);
    }

    .empty-state h3 {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-xl);
    }

    /* Profile Form */
    .profile-form {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      max-width: 600px;
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
    }

    .form-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-base);
      background: var(--bg-secondary);
      color: var(--text);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-xl);
    }

    .btn {
      padding: var(--spacing-sm) var(--spacing-xl);
      border-radius: var(--radius);
      font-weight: 500;
      font-size: var(--font-size-sm);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      border: none;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Resume Upload */
    .resume-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      max-width: 600px;
    }

    .resume-upload {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl);
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .resume-upload:hover {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.02);
    }

    .resume-upload-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--spacing-lg);
      color: var(--text-muted);
    }

    .resume-upload p {
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      margin-bottom: var(--spacing-sm);
    }

    .resume-upload a {
      color: var(--primary);
      font-weight: 500;
    }

    .resume-current {
      display: none;
    }

    .resume-current.show {
      display: block;
      margin-top: var(--spacing-lg);
      padding: var(--spacing-lg);
      background: var(--bg-secondary);
      border-radius: var(--radius);
    }

    .resume-current h4 {
      font-size: var(--font-size-base);
      margin-bottom: var(--spacing-sm);
    }

    .resume-info {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      margin-bottom: var(--spacing-md);
    }

    .candidate-card {
      animation: cardFadeIn 0.5s ease forwards;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .candidate-card:nth-child(1) { animation-delay: 0s; }
    .candidate-card:nth-child(2) { animation-delay: 0.1s; }
    .candidate-card:nth-child(3) { animation-delay: 0.2s; }
    .candidate-card:nth-child(4) { animation-delay: 0.3s; }
    .candidate-card:nth-child(5) { animation-delay: 0.4s; }

    @media (max-width: 768px) {
      .portal-nav {
        display: none;
      }
      
      .candidate-meta {
        flex-direction: column;
        gap: var(--spacing-sm);
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="portal-header">
    <div class="header-container">
      <div class="header-left">
        <a href="index.html" class="portal-logo">
          <img src="assets/logo.png" alt="Midu Group" class="nav-logo-img">
        </a>
        <nav class="portal-nav">
          <a href="vagas.html" class="portal-nav-link">Vagas</a>
          <a href="candidatar-se.html" class="portal-nav-link">Candidatar-se</a>
        </nav>
      </div>

      <div class="header-right">
        <div class="user-menu" onclick="toggleDropdown()">
          <div class="user-avatar" id="userAvatar">MS</div>
          <span class="user-name" id="userName">Maria Santos</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);">
            <polyline points="6,9 12,15 18,9"/>
          </svg>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" onclick="showMyProfile()">Meu Perfil</button>
            <button class="dropdown-item" onclick="logout()">Sair</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="portal-main reveal">
    <h1 class="section-title">Portal do Candidato</h1>
    <p class="section-subtitle">Gerencie suas candidaturas e perfil</p>

    <!-- Tabs -->
    <div class="tabs reveal">
      <button class="tab active" id="tab-candidaturas" onclick="switchTab('candidaturas')">
        Minhas Candidaturas
        <span class="tab-count" id="candidaturasCount">3</span>
      </button>
      <button class="tab" id="tab-perfil" onclick="switchTab('perfil')">
        Meu Perfil
      </button>
      <button class="tab" id="tab-curriculo" onclick="switchTab('curriculo')">
        Meu Currículo
      </button>
    </div>

    <!-- Tab: Candidaturas -->
    <div id="candidaturas-tab" class="tab-content active reveal">
      <div class="candidates-list" id="candidatesList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Tab: Perfil -->
    <div id="perfil-tab" class="tab-content reveal">
      <form class="profile-form" id="profileForm" onsubmit="saveProfile(event)">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-input" name="nome" id="profileNome" value="">
        </div>
        
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" name="email" id="profileEmail" value="">
        </div>

        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" class="form-input" name="telefone" id="profilePhone" value="">
        </div>

        <div class="form-group">
          <label class="form-label">LinkedIn (opcional)</label>
          <input type="text" class="form-input" name="linkedin" id="profileLinkedin" value="linkedin.com/in/mariasantos">
        </div>

        <div class="form-group">
          <label class="form-label">Cidade</label>
          <input type="text" class="form-input" name="cidade" id="profileCidade" value="">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="switchTab('candidaturas')">Cancelar</button>
          <button type="submit" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
            Salvar Alterações
          </button>
        </div>
      </form>
    </div>

    <!-- Tab: Currículo -->
    <div id="curriculo-tab" class="tab-content reveal">
      <div class="resume-section">
        <div class="resume-upload" id="resumeUpload" onclick="triggerUpload()">
          <svg class="resume-upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17,8 12,3 7,8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <h3>Arraste seu currículo aqui</h3>
          <p>ou clique para selecionar</p>
          <p style="font-size: var(--font-size-xs); color: var(--text-muted);">PDF, máximo 5MB</p>
          <input type="file" id="fileInput" accept=".pdf" style="display: none;" onchange="handleFileSelect(event)">
        </div>

        <div class="resume-current" id="resumeCurrent">
          <h4>Currículo atual</h4>
          <div class="resume-info">
            <p><strong>Arquivo:</strong> <span id="resumeName">curriculo_maria_santos.pdf</span></p>
            <p><strong>Tamanho:</strong> 245 KB</p>
            <p><strong>Enviado em:</strong> 08/05/2026</p>
          </div>
          <div style="display: flex; gap: var(--spacing-md);">
            <button class="btn btn-primary" onclick="downloadResume()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Baixar
            </button>
            <button class="btn btn-secondary" onclick="removeResume()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Remover
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Mock data for candidate's applications
    const myApplications = [
      { 
        id: 1, 
        vaga: 'Analista de RH', 
        empresa: 'Empresa XPTO',
        status: 'Entrevista', 
        data: '08/05/2026',
        descricao: 'Buscamos Analista de RH para atuar com rotinas de pessoal, recrutamento e seleção.'
      },
      { 
        id: 2, 
        vaga: 'Desenvolvedor Frontend', 
        empresa: 'Tech Solutions',
        status: 'Em Análise', 
        data: '07/05/2026',
        descricao: 'Desenvolvedor Frontend com experiência em React/Next.js'
      },
      { 
        id: 3, 
        vaga: 'Gerente de Vendas', 
        empresa: 'Comercial Silva',
        status: 'Aprovado', 
        data: '06/05/2026',
        descricao: 'Gerente de vendas para liderar equipe comercial'
      }
    ];

    function toggleDropdown() {
      const menu = document.getElementById('dropdownMenu');
      menu.classList.toggle('show');
    }

    function closeDropdown() {
      document.getElementById('dropdownMenu').classList.remove('show');
    }

    function switchTab(tabId) {
      // Update tab buttons
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      
      // Update content
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById(tabId + '-tab').classList.add('active');
    }

    function getStatusClass(status) {
      const map = {
        'Pendente': 'status-pendente',
        'Em Análise': 'status-analise',
        'Entrevista': 'status-entrevista',
        'Teste': 'status-teste',
        'Final': 'status-final',
        'Aprovado': 'status-aprovado',
        'Reprovado': 'status-reprovado'
      };
      return map[status] || 'status-pendente';
    }

    function renderApplications() {
      const list = document.getElementById('candidatesList');
      list.innerHTML = '';

      myApplications.forEach((app, i) => {
        const card = document.createElement('div');
        card.className = 'candidate-card';
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.transitionDelay = (i * 0.12) + 's';
        card.innerHTML = `
          <div class="candidate-card-header">
            <div>
              <div class="candidate-vaga">${app.vaga}</div>
              <div class="candidate-company">${app.empresa}</div>
            </div>
            <span class="candidate-status ${getStatusClass(app.status)}">${app.status}</span>
          </div>
          <p style="color: var(--text-muted); font-size: var(--font-size-sm); margin-bottom: var(--spacing-md);">${app.descricao}</p>
          <div class="candidate-meta">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Candidatou-se em ${app.data}
            </span>
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12,6 12,12 16,14"/>
              </svg>
              Atualizado há 2 dias
            </span>
          </div>
        `;
        list.appendChild(card);
      });

      document.getElementById('candidaturasCount').textContent = myApplications.length;

      // Trigger stagger animation after a microtask
      requestAnimationFrame(function() {
        list.querySelectorAll('.candidate-card').forEach(function(c) {
          c.style.opacity = '1';
          c.style.transform = 'translateY(0)';
        });
      });
    }

    function showMyProfile() {
      switchTab('perfil');
      closeDropdown();
    }

    function saveProfile(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      
      const profile = {
        nome: formData.get('nome'),
        email: formData.get('email'),
        telefone: formData.get('telefone'),
        linkedin: formData.get('linkedin'),
        cidade: formData.get('cidade')
      };

      // Save to localStorage
      localStorage.setItem('candidateProfile', JSON.stringify(profile));
      
      // Update header
      document.getElementById('userName').textContent = profile.nome;
      document.getElementById('userAvatar').textContent = profile.nome.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
      
      alert('Perfil atualizado com sucesso!');
    }

    function triggerUpload() {
      document.getElementById('fileInput').click();
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file && file.type === 'application/pdf') {
        if (file.size > 5 * 1024 * 1024) {
          alert('Arquivo muito grande. Máximo 5MB.');
          return;
        }
        
        const resumeData = {
          name: file.name,
          size: (file.size / 1024).toFixed(0) + ' KB',
          date: new Date().toLocaleDateString('pt-BR')
        };
        
        localStorage.setItem('candidateResume', JSON.stringify(resumeData));
        document.getElementById('resumeUpload').style.display = 'none';
        document.getElementById('resumeCurrent').classList.add('show');
        document.getElementById('resumeName').textContent = resumeData.name;
        
        alert('Currículo enviado com sucesso!');
      } else {
        alert('Apenas arquivos PDF são aceitos.');
      }
    }

    function downloadResume() {
      const resume = JSON.parse(localStorage.getItem('candidateResume'));
      if (resume) {
        alert('Download iniciado: ' + resume.name);
      }
    }

    function removeResume() {
      if (confirm('Tem certeza que deseja remover o currículo?')) {
        localStorage.removeItem('candidateResume');
        document.getElementById('resumeUpload').style.display = 'block';
        document.getElementById('resumeCurrent').classList.remove('show');
      }
    }

    function logout() {
      localStorage.removeItem('candidateLoggedIn');
      window.location.href = 'portal-login.html';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('candidateLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = 'portal-login.html';
        return;
      }

      // Load profile
      const profile = JSON.parse(localStorage.getItem('candidateProfile'));
      if (profile) {
        document.getElementById('profileNome').value = profile.nome;
        document.getElementById('profileEmail').value = profile.email;
        document.getElementById('profilePhone').value = profile.telefone;
        document.getElementById('profileLinkedin').value = profile.linkedin || '';
        document.getElementById('profileCidade').value = profile.cidade;
        
        document.getElementById('userName').textContent = profile.nome;
        document.getElementById('userAvatar').textContent = profile.nome.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
      }

      // Check resume
      const resume = JSON.parse(localStorage.getItem('candidateResume'));
      if (resume) {
        document.getElementById('resumeUpload').style.display = 'none';
        document.getElementById('resumeCurrent').classList.add('show');
        document.getElementById('resumeName').textContent = resume.name;
      }

      renderApplications();

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.user-menu')) {
          closeDropdown();
        }
      });
    });
  </script>
  <!-- Scroll Reveal Observer -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var reveals = document.querySelectorAll('.reveal, .reveal-scale');
      if (reveals.length > 0 && 'IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        reveals.forEach(function(el) { observer.observe(el); });
      } else {
        reveals.forEach(function(el) { el.classList.add('revealed'); });
      }
    });
  </script>
</body>
