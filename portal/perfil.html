<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Portal do Candidato</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-family);
      background: var(--bg-secondary);
    }
    
    /* Header */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: var(--spacing-md) 0;
    }
    
    .header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }
    
    .logo img { width: 36px; height: 36px; }
    
    .header-nav {
      display: flex;
      align-items: center;
      gap: var(--spacing-xl);
    }
    
    .header-nav a {
      font-size: var(--font-size-sm);
      color: var(--text);
      text-decoration: none;
      transition: var(--transition);
    }
    
    .header-nav a:hover { color: var(--primary); }
    
    /* User Menu */
    .user-menu {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      position: relative;
    }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: var(--font-size-sm);
      cursor: pointer;
    }
    
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: var(--spacing-sm);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      min-width: 200px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: var(--transition);
    }
    
    .dropdown.active .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md);
      font-size: var(--font-size-sm);
      color: var(--text);
      text-decoration: none;
      transition: var(--transition);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }
    
    .dropdown-item:hover {
      background: var(--bg-secondary);
      color: var(--primary);
    }
    
    .dropdown-item svg { width: 16px; height: 16px; }
    
    .dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: var(--spacing-xs) 0;
    }
    
    /* Breadcrumb */
    .breadcrumb {
      padding: var(--spacing-lg) 0;
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }
    
    .breadcrumb a {
      color: var(--primary);
      text-decoration: none;
    }
    
    .breadcrumb a:hover { text-decoration: underline; }
    
    .breadcrumb span { margin: 0 var(--spacing-xs); }
    
    /* Main */
    .main-content {
      max-width: 800px;
      margin: var(--spacing-xl) auto;
      padding: 0 var(--spacing-lg);
    }
    
    .page-title {
      font-size: var(--font-size-2xl);
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
    }
    
    .page-subtitle {
      font-size: var(--font-size-base);
      color: var(--text-muted);
      margin-bottom: var(--spacing-xl);
    }
    
    /* Form Card */
    .form-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
    }
    
    .form-card-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border);
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }
    
    .form-group.full { grid-column: 1 / -1; }
    
    .form-label {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text);
    }
    
    .form-input {
      padding: var(--spacing-md);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-base);
      font-family: var(--font-family);
      transition: var(--transition);
      width: 100%;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    
    .form-actions {
      display: flex;
      gap: var(--spacing-md);
      justify-content: flex-end;
    }
    
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column; }
      .form-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="../index.html" class="logo">
        <img src="../assets/logo.png" alt="Midu Group" class="nav-logo-img">
      </a>
      
      <nav class="header-nav">
        <a href="../vagas.html">Vagas</a>
        <a href="candidaturas.html" style="color: var(--primary);">Minhas Candidaturas</a>
        <a href="perfil.html" style="font-weight: 600;">Meu Perfil</a>
        <a href="curriculo.html">Meu Currículo</a>
      </nav>
      
      <div class="user-menu dropdown" id="userMenu">
        <div style="display: flex; align-items: center; gap: var(--spacing-md);">
          <span id="userNameDisplay" style="font-size: var(--font-size-sm); font-weight: 500;">Carregando...</span>
          <div class="user-avatar" onclick="toggleDropdown()">--</div>
        </div>
        
        <div class="dropdown-menu">
          <a href="perfil.html" class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Meu Perfil
          </a>
          <a href="candidaturas.html" class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
            </svg>
            Minhas Candidaturas
          </a>
          <a href="curriculo.html" class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
            </svg>
            Meu Currículo
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" onclick="sair()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16,17 21,12 16,7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="breadcrumb">
      <a href="../index.html">Home</a>
      <span>›</span>
      <a href="candidaturas.html">Portal do Candidato</a>
      <span>›</span>
      <span>Meu Perfil</span>
    </div>

    <h1 class="page-title">Meu Perfil</h1>
    <p class="page-subtitle">Mantenha seus dados atualizados</p>

    <form id="perfilForm" onsubmit="salvarPerfil(event)">
      <div class="form-card">
        <h2 class="form-card-title">Informações Pessoais</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-input" id="nome" value="">
          </div>
          
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" value="">
          </div>
          
          <div class="form-group">
            <label class="form-label">Telefone</label>
            <input type="tel" class="form-input" id="telefone" value="">
          </div>
          
          <div class="form-group">
            <label class="form-label">LinkedIn (Opcional)</label>
            <input type="url" class="form-input" id="linkedin" value="https://linkedin.com/in/mariasantos">
          </div>
          
          <div class="form-group full">
            <label class="form-label">Cidade</label>
            <input type="text" class="form-input" id="cidade" value="">
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="cancelar()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
      </div>
    </form>
  </main>

  <script>
    function toggleDropdown() {
      document.getElementById('userMenu').classList.toggle('active');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      var dropdown = document.getElementById('userMenu');
      if (!dropdown.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });

    function carregarPerfil() {
      var profile = JSON.parse(localStorage.getItem('candidateProfile'));
      if (profile) {
        document.getElementById('nome').value = profile.nome || '';
        document.getElementById('email').value = profile.email || '';
        document.getElementById('telefone').value = profile.telefone || '';
        document.getElementById('linkedin').value = profile.linkedin || '';
        document.getElementById('cidade').value = profile.cidade || '';

        // Update header user info
        var nameSpan = document.querySelector('.user-menu span');
        var avatar = document.querySelector('.user-avatar');
        if (nameSpan) nameSpan.textContent = profile.nome;
        if (avatar) avatar.textContent = profile.nome.split(' ').map(function(n) { return n[0]; }).join('').substring(0,2).toUpperCase();
      }
    }

    function salvarPerfil(e) {
      e.preventDefault();
      var profile = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        linkedin: document.getElementById('linkedin').value,
        cidade: document.getElementById('cidade').value
      };
      localStorage.setItem('candidateProfile', JSON.stringify(profile));
      carregarPerfil();
      alert('Perfil atualizado com sucesso!');
    }

    function cancelar() {
      if (confirm('Descartar alterações?')) {
        window.location.reload();
      }
    }

    function sair() {
      if (confirm('Tem certeza que deseja sair?')) {
        localStorage.removeItem('candidateLoggedIn');
        window.location.href = '../portal-login.html';
      }
    }

    // Checar login + carregar perfil
    document.addEventListener('DOMContentLoaded', function() {
      if (localStorage.getItem('candidateLoggedIn') !== 'true') {
        window.location.href = '../portal-login.html';
        return;
      }
      carregarPerfil();
    });
  </script>
</body>
</html>
