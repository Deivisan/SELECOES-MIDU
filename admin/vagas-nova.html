<!DOCTYPE html>
<html lang="pt-BR" style="background:#281446">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Vaga - Admin | Midu Group</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-secondary);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--text);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .sidebar-header {
      padding: var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-size-lg);
      font-weight: 700;
    }
    
    .sidebar-logo img { height: 32px; width: auto; }
    
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .user-info span {
      display: block;
    }
    
    .user-name {
      font-weight: 500;
      font-size: var(--font-size-sm);
    }
    
    .user-role {
      font-size: var(--font-size-xs);
      color: rgba(255,255,255,0.6);
    }
    
    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-lg) 0;
    }
    
    .nav-section {
      margin-bottom: var(--spacing-lg);
    }
    
    .nav-section-title {
      padding: var(--spacing-sm) var(--spacing-xl);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      color: rgba(255,255,255,0.8);
      font-size: var(--font-size-sm);
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }
    
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .nav-item svg {
      width: 20px;
      height: 20px;
    }
    
    .sidebar-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-sair {
      width: 100%;
      background: transparent;
      color: rgba(255,255,255,0.6);
      padding: var(--spacing-md);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    
    .btn-sair:hover { color: white; background: rgba(255,255,255,0.1); }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: var(--spacing-xl);
      max-width: 1200px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }
    
    .back-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      color: var(--text-muted);
      text-decoration: none;
      font-size: var(--font-size-sm);
      transition: var(--transition);
    }
    
    .back-link:hover {
      color: var(--primary);
    }

    .page-header h1 {
      font-size: var(--font-size-2xl);
      font-weight: 600;
    }

    /* Form Card */
    .form-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
    }

    .form-section-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    /* Beneficios Grid */
    .beneficios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.625rem;
      margin-top: 0.25rem;
    }

    .beneficio-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      padding: 0.875rem 0.5rem;
      background: var(--bg-secondary);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .beneficio-card:hover {
      border-color: #d1d5db;
      background: var(--bg);
    }

    .beneficio-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .beneficio-card .beneficio-check {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      opacity: 0;
    }

    .beneficio-card .beneficio-check svg {
      display: none;
      color: white;
      width: 10px;
      height: 10px;
    }

    .beneficio-card input:checked + .beneficio-check {
      background: var(--primary);
      border-color: var(--primary);
      opacity: 1;
    }

    .beneficio-card input:checked + .beneficio-check svg {
      display: block;
    }

    .beneficio-card input:checked ~ .beneficio-icon {
      color: var(--primary);
    }

    .beneficio-card input:checked ~ .beneficio-label {
      color: var(--primary);
      font-weight: 600;
    }

    .beneficio-card:has(input:checked) {
      border-color: var(--primary);
      background: rgba(40, 20, 70, 0.05);
    }

    .beneficio-icon {
      color: var(--text-muted);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
    }

    .beneficio-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      transition: color 0.2s;
      line-height: 1.2;
    }

    @media (max-width: 600px) {
      .beneficios-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .form-label {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text);
    }

    .form-label.required::after {
      content: ' *';
      color: var(--error);
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font-body);
      transition: var(--transition);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-hint {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-lg);
    }

    /* Buttons */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-md);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: var(--spacing-sm) var(--spacing-xl);
      border-radius: var(--radius);
      font-weight: 500;
      font-size: var(--font-size-sm);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      border: none;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--text);
      color: white;
      padding: var(--spacing-md) var(--spacing-xl);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: none;
      animation: slideIn 0.3s ease;
      z-index: 9999;
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--error);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-header span, .sidebar-user, .nav-section-title, .nav-item span, .sidebar-footer span { display: none; }
      .sidebar-nav { padding-top: var(--spacing-xl); }
      .nav-item { justify-content: center; padding: var(--spacing-md); }
      .main-content { margin-left: 80px; }
      .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .form-row-2, .form-row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <a href="vagas.html" class="back-link" onclick="navigateTo('vagas.html')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
        Voltar
      </a>
      <h1 id="formTitle">Nova Vaga</h1>
    </div>

    <form id="vagaForm" onsubmit="saveVaga(event)">
      <div class="form-card">
        <h3 class="form-section-title">Informações Básicas</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label required">Título da Vaga</label>
            <input type="text" class="form-input" name="title" placeholder="Ex: Analista de RH">
          </div>
          <div class="form-group">
            <label class="form-label required">Empresa Contratante</label>
            <input type="text" class="form-input" name="empresa" placeholder="Ex: Empresa XPTO">
          </div>
          <div class="form-group">
            <label class="form-label required">Categoria</label>
            <select class="form-select" name="categoria">
              <option value="">Selecione...</option>
              <option value="Tecnologia">Tecnologia</option>
              <option value="RH">RH</option>
              <option value="Vendas">Vendas</option>
              <option value="Administração">Administração</option>
              <option value="Saúde">Saúde</option>
              <option value="Educação">Educação</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label required">Localização</label>
            <input type="text" class="form-input" name="localizacao" placeholder="Ex: Salvador, BA">
          </div>
          <div class="form-group">
            <label class="form-label">Salário</label>
            <input type="text" class="form-input" name="salario" placeholder="Ex: R$ 3.500,00 ou A combinar">
          </div>
          <div class="form-group">
            <label class="form-label required">Status</label>
            <select class="form-select" name="status">
              <option value="Ativa">Ativa</option>
              <option value="Inativa">Inativa</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h3 class="form-section-title">Descrição da Vaga</h3>
        <div class="form-grid">
          <div class="form-group full-width">
            <label class="form-label required">Descrição</label>
            <textarea class="form-textarea" name="descricao" placeholder="Descreva as responsabilidades e expectativas da vaga..."></textarea>
          </div>
          <div class="form-group full-width">
            <label class="form-label required">Requisitos</label>
            <textarea class="form-textarea" name="requisitos" placeholder="Liste os requisitos da vaga, um por linha..."></textarea>
          </div>
          <div class="form-group full-width">
            <label class="form-label">Benefícios</label>
            <div class="beneficios-grid">
              <label class="beneficio-card">
                <input type="checkbox" name="beneficios" value="Vale Refeição (VR)">
                <span class="beneficio-check">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
                </span>
                <span class="beneficio-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                </span>
                <span class="beneficio-label">Vale Refeição</span>
              </label>
              <label class="beneficio-card">
                <input type="checkbox" name="beneficios" value="Vale Alimentação (VA)">
                <span class="beneficio-check">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
                </span>
                <span class="beneficio-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                </span>
                <span class="beneficio-label">Vale Alimentação</span>
              </label>
              <label class="beneficio-card">
                <input type="checkbox" name="beneficios" value="Vale Transporte (VT)">
                <span class="beneficio-check">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>

                </span>

                <span class="beneficio-label">Gympass / Wellhub</span>

              <label class="beneficio-card">

                </span>
                <span class="beneficio-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
                </span>
                <span class="beneficio-label">Home Office</span>
              </label>
              <label class="beneficio-card">
                <input type="checkbox" name="beneficios" value="Horário Flexível">
                <span class="beneficio-check">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
                </span>
                <span class="beneficio-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                </span>

  <script>
    function navigateTo(page) {
      var isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (page !== 'login.html' && !isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
      var currentPage = window.location.pathname.split('/').pop() || 'index.html';
      if (page === currentPage) return;
        var ol = document.getElementById("loadingOverlay");
        if (ol) ol.style.display = "flex";
        setTimeout(function() { window.location.href = page; }, 200);
        return;
      window.location.href = page;
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    function saveVaga(e) {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const vaga = {
        title: formData.get('title'),
        empresa: formData.get('empresa'),
        categoria: formData.get('categoria'),
        localizacao: formData.get('localizacao'),
        salario: formData.get('salario') || 'A combinar',
        status: formData.get('status'),
        descricao: formData.get('descricao'),
        requisitos: formData.get('requisitos'),
        beneficios: Array.from(document.querySelectorAll('input[name="beneficios"]:checked')).map(function(cb) { return cb.value; }).join(', '),
        contrato: formData.get('contrato') || '',
        cargaHoraria: formData.get('cargaHoraria') || '',
        nivel: formData.get('nivel') || '',
        candidatos: 0,
        data: new Date().toLocaleDateString('pt-BR')
      };

      // Simulate saving (in real app, would POST to backend)
      console.log('Salvando vaga:', vaga);
      
      showToast('Vaga criada com sucesso!', 'success');
      
      setTimeout(() => {
        navigateTo('vagas.html');
      }, 1000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = 'login.html';
        return;
      }
    });
  </script>
</body>
