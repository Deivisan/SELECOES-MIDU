<!DOCTYPE html>
<html lang="pt-BR" style="background:#281446">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Midu Group</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #281446 0%, #1c0f2e 50%, #3a1f6e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--spacing-2xl);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .login-logo-img {
      width: 48px;
      height: 48px;
    }

    .login-logo span {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: #1e293b;
    }

    .login-title {
      font-size: var(--font-size-xl);
      font-weight: 600;
      color: #1e293b;
      margin-bottom: var(--spacing-sm);
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: var(--font-size-sm);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: #1e293b;
      margin-bottom: var(--spacing-xs);
    }

    .form-input {
      width: 100%;
      padding: var(--spacing-md);
      border: 1px solid #e2e8f0;
      border-radius: var(--radius);
      font-size: var(--font-size-base);
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-sm);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      transition: var(--transition);
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: var(--spacing-md);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: var(--font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
    }

    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(40, 20, 70, 0.4);
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: var(--spacing-md);
      border-radius: var(--radius);
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-sm);
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--spacing-lg);
      color: white;
      text-decoration: none;
      font-size: var(--font-size-sm);
      opacity: 0.9;
    }

    .back-link:hover {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: var(--spacing-xl);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <img src="../assets/logo.png" alt="Midu Group" class="login-logo-img">
        </div>
        <h1 class="login-title">Acesso Restrito</h1>
        <p class="login-subtitle">Entre com suas credenciais para acessar o painel administrativo</p>
      </div>

      <div class="error-message" id="errorMessage">
        Usuário ou senha incorretos. Tente novamente.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Usuário</label>
          <input type="text" id="username" class="form-input" placeholder="Digite seu usuário">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" class="form-input" placeholder="Digite sua senha">
        </div>

        <div class="form-options">
          <div class="checkbox-group">
            <input type="checkbox" id="remember">
            <label for="remember">Lembrar-me</label>
          </div>
          <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10,17 15,12 10,7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Entrar
        </button>
      </form>
    </div>

    <a href="../index.html" class="back-link">← Voltar para o site</a>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const errorMsg = document.getElementById('errorMessage');

      localStorage.setItem('adminLoggedIn', 'true');
      if (remember) {
        localStorage.setItem('adminRemember', 'true');
      }
      
      // Save user info for header
      localStorage.setItem('adminUser', JSON.stringify({
        nome: username || 'Administrador',
        email: username ? username + '@midugroup.com.br' : 'admin@midugroup.com.br'
      }));

      // Show loading transition
      var btn = document.querySelector('.btn-login');
      btn.innerHTML = '<span class="loading-spinner-sm" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></span> Entrando...';
      btn.disabled = true;
      
      setTimeout(function() {
        window.location.href = 'index.html';
      }, 500);
    }

    // Check if already logged in
    document.addEventListener('DOMContentLoaded', function() {
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
